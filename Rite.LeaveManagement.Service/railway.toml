[build]
builder = "nixpacks"

[phases.setup]
nixPkgs = ["dotnet-sdk_8"]

[phases.install]
cmds = [
  "dotnet restore Rite.LeaveManagement.Svc/Rite.LeaveManagement.Svc.csproj"
]

[phases.build]
cmds = [
  "dotnet publish Rite.LeaveManagement.Svc/Rite.LeaveManagement.Svc.csproj --no-restore -c Release -o out"
]

[start]
cmd = "./out/Rite.LeaveManagement.Svc"
